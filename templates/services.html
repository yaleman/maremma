{% extends "base_template.html" %}

{% block content %}

<section class="app-stack">
  <div class="app-card">
    <div class="app-card-header">
      <div>
        <h1 class="app-section-title">Services</h1>
      </div>
      <div class="app-muted">{{ services.len() }} services</div>
    </div>
    <div class="app-card-body">
      <form method="get" class="flex flex-col gap-3 sm:flex-row">
        <input type="text"
          name="search"
          placeholder="Search services"
          value="{{search_string}}"
          class="app-input sm:flex-1" />
        <input type="hidden" value="{{ ord }}" name="ord" />
        <input type="submit" value="Search" class="app-button app-button-primary" />
      </form>
    </div>
  </div>

  <div class="app-table-wrap">
    <div class="overflow-x-auto">
      <table class="app-table">
        <thead class="app-table-head">
          <tr>
            <th class="app-th">Service</th>
            <th class="app-th text-right">Checks</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-200 bg-white">
          {% for service in services %}
          <tr class="app-row">
            <td class="app-td">
              <a href="{{Urls::Service}}/{{service.id}}" class="app-link">{{service.name}}</a>
            </td>
            <td class="app-td text-right">{{service.check_count}}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>

{% endblock content %}
