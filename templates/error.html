{% extends "base_template.html" %}

{% block content %}
<div class="flex flex-col items-center gap-4">
    <h1 class="text-3xl font-bold">An error occurred!</h1>
    <h2 class="text-2xl font-semibold">{{ title }}</h2>
    <p class="text-lg text-gray-600">{{ message }}</p>
    <button type="button"
        class="app-button app-button-secondary"
        onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='{{Urls::Index}}'; }">
        Go back
    </button>
    <a class="app-link" href="{{Urls::Index}}">Click here to go back to the homepage</a>
</div>
{% endblock %}
