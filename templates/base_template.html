<!DOCTYPE html>
<html lang="en" class="h-full">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="{{Urls::Static}}/js/maremma.js"></script>
        <link rel="icon" href="{{Urls::Static}}/img/maremma-icon.svg"
            type="image/svg+xml">
        <link rel="icon" href="{{Urls::Static}}/img/maremma-icon-128.png"
            type="image/png">
        <link rel="stylesheet" href="{{Urls::Static}}/css/app.css" />
        <title>{{ title }}{% if !title.is_empty() %} - {% endif %}Maremma</title>
        {% block header %}{% endblock %}
    </head>
    <body class="min-h-full">
        <div class="app-shell">
            <header class="app-topbar">
                <div class="app-topbar-inner">
                    <a href="{{Urls::Index}}" class="app-brand">
                        <img src="{{Urls::Static}}/img/maremma-icon.svg"
                            alt="Maremma" class="app-brand-mark" />
                        <div class="app-brand-text">
                            <div class="app-brand-title">Maremma</div>
                        </div>
                    </a>
                    <nav class="app-nav" aria-label="Primary">
                        <a href="{{Urls::Tools}}" class="app-nav-link">Tools</a>
                        <a href="{{Urls::Services}}" class="app-nav-link">Services</a>
                        <a href="{{Urls::HostGroups}}" class="app-nav-link">Groups</a>
                        <a href="{{Urls::Hosts}}" class="app-nav-link">Hosts</a>
                    </nav>
                    <div class="flex items-center gap-2">
                        {% if let Some(username) = username %}
                        <a href="{{Urls::Profile}}" class="app-nav-chip hidden sm:inline-flex">
                            {{username}}
                        </a>
                        <a href="{{Urls::Logout}}" class="app-nav-link">Log out</a>
                        {% else %}
                        <a href="{{Urls::Index}}" class="app-nav-link">Log in</a>
                        {% endif %}
                    </div>
                </div>
            </header>

            <main class="app-main">
                <div class="app-content">
                    {% block content %}{% endblock %}
                </div>
            </main>

            <footer class="app-footer">
                <div class="app-footer-inner">
                    <span>
                        Powered by
                        <a class="app-link" href="https://github.com/yaleman/maremma/">Maremma</a>
                    </span>
                    <span class="hidden sm:inline">Server-rendered monitoring</span>
                </div>
            </footer>
        </div>
    </body>
</html>
